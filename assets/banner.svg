<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.4"/>
    </pattern>
    
    <!-- Glow effects -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glowLarge" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Candle gradients -->
    <linearGradient id="bullGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    
    <linearGradient id="bearGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
    
    <linearGradient id="wickGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0.8"/>
    </linearGradient>
    
    <!-- Gold accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  
  <!-- Left side candlestick chart visualization -->
  <g opacity="0.15">
    <rect x="40" y="40" width="6" height="80" rx="3" fill="#10B981"/>
    <rect x="60" y="70" width="6" height="50" rx="3" fill="#EF4444"/>
    <rect x="80" y="30" width="6" height="100" rx="3" fill="#10B981"/>
    <rect x="100" y="55" width="6" height="70" rx="3" fill="#EF4444"/>
    <rect x="120" y="20" width="6" height="110" rx="3" fill="#10B981"/>
    <rect x="140" y="80" width="6" height="40" rx="3" fill="#EF4444"/>
    <rect x="160" y="45" width="6" height="90" rx="3" fill="#10B981"/>
    <rect x="180" y="65" width="6" height="60" rx="3" fill="#EF4444"/>
    <rect x="200" y="35" width="6" height="95" rx="3" fill="#10B981"/>
    <rect x="220" y="90" width="6" height="30" rx="3" fill="#EF4444"/>
  </g>
  
  <!-- Right side candlestick chart visualization -->
  <g opacity="0.15">
    <rect x="1060" y="60" width="6" height="70" rx="3" fill="#EF4444"/>
    <rect x="1080" y="40" width="6" height="90" rx="3" fill="#10B981"/>
    <rect x="1100" y="75" width="6" height="55" rx="3" fill="#EF4444"/>
    <rect x="1120" y="25" width="6" height="105" rx="3" fill="#10B981"/>
    <rect x="1140" y="55" width="6" height="65" rx="3" fill="#EF4444"/>
    <rect x="1160" y="35" width="6" height="85" rx="3" fill="#10B981"/>
    <rect x="1180" y="80" width="6" height="40" rx="3" fill="#EF4444"/>
    <rect x="1200" y="20" width="6" height="100" rx="3" fill="#10B981"/>
    <rect x="1220" y="65" width="6" height="60" rx="3" fill="#EF4444"/>
    <rect x="1240" y="45" width="6" height="80" rx="3" fill="#10B981"/>
  </g>
  
  <!-- Central glow effect -->
  <circle cx="640" cy="160" r="200" fill="url(#goldGrad)" opacity="0.03" filter="url(#glowLarge)"/>
  
  <!-- Main candlestick icon (center) -->
  <g transform="translate(640, 160)" filter="url(#glow)">
    <!-- Wick -->
    <rect x="-2" y="-45" width="4" height="90" rx="2" fill="url(#wickGrad)"/>
    <!-- Body -->
    <rect x="-15" y="-35" width="30" height="70" rx="6" fill="url(#bullGrad)"/>
    <!-- Inner highlight -->
    <rect x="-15" y="-35" width="30" height="8" rx="6" fill="#ffffff" opacity="0.15"/>
    <rect x="-8" y="-20" width="4" height="40" rx="2" fill="#ffffff" opacity="0.2"/>
  </g>
  
  <!-- Bull icon subtle background -->
  <g transform="translate(640, 160)" opacity="0.08">
    <path d="M 0,-50 L 8,-40 L 3,-35 L 12,-25 L 6,-20 L 18,-8 L 10,-5 L 0,0 L -10,-5 L -18,-8 L -6,-20 L -12,-25 L -3,-35 L -8,-40 Z" fill="#F59E0B"/>
  </g>
  
  <!-- Title text -->
  <g transform="translate(640, 260)">
    <!-- Sid Trading Lab -->
    <text x="0" y="0" fill="#F1F5F9" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" text-anchor="middle" letter-spacing="-1">
      Sid Trading Lab
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="28" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" text-anchor="middle" letter-spacing="3" text-transform="uppercase">
      DEMO-FIRST • AI-SUPERVISED • SAFETY-FIRST
    </text>
    
    <!-- Decorative line -->
    <rect x="-60" y="42" width="120" height="2" rx="1" fill="url(#goldGrad)" opacity="0.6"/>
  </g>
  
  <!-- Corner accents -->
  <rect x="20" y="20" width="40" height="2" rx="1" fill="url(#goldGrad)" opacity="0.4"/>
  <rect x="20" y="20" width="2" height="40" rx="1" fill="url(#goldGrad)" opacity="0.4"/>
  
  <rect x="1220" y="298" width="40" height="2" rx="1" fill="url(#goldGrad)" opacity="0.4"/>
  <rect x="1258" y="258" width="2" height="40" rx="1" fill="url(#goldGrad)" opacity="0.4"/>
</svg>