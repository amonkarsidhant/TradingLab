<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="1000" height="720">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
          </marker>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="#0f172a" />
        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- EXTERNAL: User / Telegram / Discord -->
        <rect x="20" y="280" width="120" height="55" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
        <text x="80" y="302" fill="white" font-size="11" font-weight="600" text-anchor="middle">User / Chat</text>
        <text x="80" y="320" fill="#94a3b8" font-size="9" text-anchor="middle">Telegram / Discord</text>

        <!-- T212 External Broker -->
        <rect x="20" y="440" width="120" height="55" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="80" y="462" fill="white" font-size="11" font-weight="600" text-anchor="middle">Trading 212</text>
        <text x="80" y="480" fill="#94a3b8" font-size="9" text-anchor="middle">Demo API</text>

        <!-- Security boundary -->
        <rect x="170" y="220" width="810" height="310" rx="12" fill="rgba(136, 19, 55, 0.05)" stroke="#fb7185" stroke-width="1" stroke-dasharray="8,4"/>
        <text x="184" y="238" fill="#fb7185" font-size="10" font-weight="600">macOS Security Zone — .env / SQLite / SSH</text>

        <!-- CLI -->
        <rect x="200" y="280" width="110" height="50" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="255" y="302" fill="white" font-size="11" font-weight="600" text-anchor="middle">CLI</text>
        <text x="255" y="318" fill="#94a3b8" font-size="9" text-anchor="middle">Typer + Rich</text>

        <!-- Strategy Engine -->
        <rect x="350" y="280" width="130" height="50" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="415" y="302" fill="white" font-size="11" font-weight="600" text-anchor="middle">Strategy Engine</text>
        <text x="415" y="318" fill="#94a3b8" font-size="9" text-anchor="middle">Momentum / MA / RSI</text>

        <!-- Backtest Engine -->
        <rect x="520" y="280" width="130" height="50" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="585" y="302" fill="white" font-size="11" font-weight="600" text-anchor="middle">Backtest Engine</text>
        <text x="585" y="318" fill="#94a3b8" font-size="9" text-anchor="middle">Sharpe / Drawdown</text>

        <!-- Position Watcher -->
        <rect x="690" y="280" width="130" height="50" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="755" y="302" fill="white" font-size="11" font-weight="600" text-anchor="middle">Watcher</text>
        <text x="755" y="318" fill="#94a3b8" font-size="9" text-anchor="middle">-7% Trailing Stop</text>

        <!-- Market Data (yfinance) -->
        <rect x="350" y="380" width="130" height="50" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="415" y="402" fill="white" font-size="11" font-weight="600" text-anchor="middle">Market Data</text>
        <text x="415" y="418" fill="#94a3b8" font-size="9" text-anchor="middle">yfinance + SQLite</text>

        <!-- Broker Client -->
        <rect x="520" y="380" width="130" height="50" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="585" y="402" fill="white" font-size="11" font-weight="600" text-anchor="middle">T212 Client</text>
        <text x="585" y="418" fill="#94a3b8" font-size="9" text-anchor="middle">Orders / Positions</text>

        <!-- Unified Telegram Bot -->
        <rect x="200" y="460" width="160" height="55" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="280" y="482" fill="white" font-size="11" font-weight="600" text-anchor="middle">Telegram Bot</text>
        <text x="280" y="500" fill="#94a3b8" font-size="9" text-anchor="middle">PTB JobQueue + run_polling</text>

        <!-- launchd Scheduler -->
        <rect x="400" y="460" width="140" height="55" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="470" y="482" fill="white" font-size="11" font-weight="600" text-anchor="middle">launchd</text>
        <text x="470" y="500" fill="#94a3b8" font-size="9" text-anchor="middle">5 daily plists</text>

        <!-- SQLite Journal -->
        <rect x="580" y="460" width="140" height="55" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text x="650" y="482" fill="white" font-size="11" font-weight="600" text-anchor="middle">SQLite Journal</text>
        <text x="650" y="500" fill="#94a3b8" font-size="9" text-anchor="middle">Trades + Round Trips</text>

        <!-- Munger Reflection -->
        <rect x="760" y="460" width="160" height="55" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
        <text x="840" y="482" fill="white" font-size="11" font-weight="600" text-anchor="middle">Munger Reflection</text>
        <text x="840" y="500" fill="#94a3b8" font-size="9" text-anchor="middle">Weekly AI Review</text>

        <!-- Arrows -->
        <line x1="140" y1="305" x2="198" y2="305" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="140" y1="468" x2="198" y2="488" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="280" y1="330" x2="280" y2="378" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="310" y1="305" x2="348" y2="305" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="480" y1="305" x2="518" y2="305" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="650" y1="305" x2="688" y2="305" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="480" y1="405" x2="518" y2="405" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="650" y1="405" x2="758" y2="468" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="360" y1="515" x2="398" y2="488" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="540" y1="515" x2="578" y2="488" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="720" y1="488" x2="758" y2="488" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <line x1="360" y1="405" x2="360" y2="460" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- Legend -->
        <text x="820" y="60" fill="white" font-size="10" font-weight="600">Legend</text>
        <rect x="820" y="72" width="16" height="10" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/><text x="842" y="80" fill="#94a3b8" font-size="8">UI / Bot</text>
        <rect x="820" y="88" width="16" height="10" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/><text x="842" y="96" fill="#94a3b8" font-size="8">Engine</text>
        <rect x="820" y="104" width="16" height="10" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/><text x="842" y="112" fill="#94a3b8" font-size="8">Data</text>
        <rect x="820" y="120" width="16" height="10" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1"/><text x="842" y="128" fill="#94a3b8" font-size="8">External</text>
        <rect x="820" y="136" width="16" height="10" rx="2" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1"/><text x="842" y="144" fill="#94a3b8" font-size="8">AI / Security</text>
      </svg>